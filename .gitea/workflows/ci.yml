# CI-gated continuous deploy for aiworkloads (Gitea Actions → Coolify).
#
# Pattern inherited from optics-master's ci.yml: deploy only after verification
# passes, stamp SOURCE_COMMIT into the app env pre-trigger (feeds dist/version.json;
# Coolify strips .git from the build context and passes no SHA of its own), then
# POLL the Coolify deployment to completion so a failed image build turns this run
# red and pushes a ntfy warning instead of hiding behind running:healthy.
#
# Runner constraints (forge act_runner): ZERO github-hosted actions — manual
# checkout against local Gitea + a pinned Node tarball; runs-on must be
# ubuntu-latest (the only label the runner advertises).
#
# Secrets (repo-level Gitea Actions secrets):
#   COOLIFY_WEBHOOK = http://192.168.1.67:8000/api/v1/deploy?uuid=rrv73rfnkabhwls427flrchb
#   COOLIFY_TOKEN   = Coolify API bearer token
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ai-networking-education-center
    steps:
      - name: Checkout (manual — see header)
        working-directory: .
        env:
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init -q .
          git remote add origin "http://192.168.1.63:3000/${{ github.repository }}.git"
          auth=$(printf 'oauth2:%s' "$GIT_TOKEN" | base64 -w0)
          git -c http.extraHeader="Authorization: Basic $auth" fetch -q --depth 1 origin "${{ github.sha }}"
          git checkout -q FETCH_HEAD
      - name: Install Node 22 (pinned tarball, SHA-256 verified)
        working-directory: .
        run: |
          curl -fsSL -o /tmp/node.tar.xz \
            https://nodejs.org/dist/v22.14.0/node-v22.14.0-linux-x64.tar.xz
          echo "69b09dba5c8dcb05c4e4273a4340db1005abeafe3927efda2bc5b249e80437ec  /tmp/node.tar.xz" | sha256sum -c -
          tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
          node --version && npm --version
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Validate claim IDs and sources
        run: npm run check:claim-ids && npm run check:claim-sources
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  deploy:
    needs: [verify]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # Hard ceiling so a hung step can't wedge the single act_runner slot;
    # poll budget below is 30 min, 40 covers it.
    timeout-minutes: 40
    steps:
      - name: Stamp SOURCE_COMMIT build env (feeds dist/version.json)
        run: |
          # is_preview:false matters — preview-scoped envs are silently not
          # injected into production builds.
          app="http://192.168.1.67:8000/api/v1/applications/rrv73rfnkabhwls427flrchb"
          body='{"key":"SOURCE_COMMIT","value":"${{ github.sha }}","is_preview":false}'
          code=$(curl -s -o /tmp/env.out -w '%{http_code}' -X PATCH "$app/envs" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --header "Content-Type: application/json" -d "$body")
          if [ "$code" -ge 400 ]; then
            code=$(curl -s -o /tmp/env.out -w '%{http_code}' -X POST "$app/envs" \
              --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              --header "Content-Type: application/json" -d "$body")
          fi
          echo "env stamp http=$code"; cat /tmp/env.out; [ "$code" -lt 400 ]
      - name: Trigger Coolify deploy and poll to completion
        run: |
          resp=$(curl -sf -m 30 --request GET "${{ secrets.COOLIFY_WEBHOOK }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          echo "trigger response: $resp"
          dep=$(echo "$resp" | grep -o '"deployment_uuid":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$dep" ]; then
            echo "No deployment_uuid in response — cannot poll"; exit 1
          fi
          echo "polling deployment $dep"
          # ⚠️ The deployment record EMBEDS the application object whose own
          # "status" appears first — parse the TOP-LEVEL status with python3
          # (in the runner image; no jq there), never grep|head.
          for i in $(seq 1 90); do
            st=$(curl -s -m 15 \
              --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              "http://192.168.1.67:8000/api/v1/deployments/$dep" \
              | python3 -c "import json,sys;print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            echo "[$i] status=$st"
            case "$st" in
              finished) exit 0 ;;
              failed|cancelled*) echo "deploy $st"; exit 1 ;;
            esac
            sleep 20
          done
          echo "deploy still not finished after 30 min"; exit 1
      - name: Notify on failed deploy
        if: failure()
        run: |
          curl -s -m 10 \
            -H "Title: aiworkloads deploy FAILED" \
            -H "Tags: rotating_light" \
            -d "Coolify deploy for ${{ github.sha }} failed or hung — run: http://192.168.1.63:3000/${{ github.repository }}/actions/runs/${{ github.run_number }}" \
            http://192.168.1.55:8070/homelab-warnings || true
